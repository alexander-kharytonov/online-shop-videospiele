<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta
      name="description"
      content="Kontaktseite fuer Fragen rund um den Videospiel-Shop."
    />
    <title>Online-Shop fuer Videospiele | Kontakt</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="store-shell">
      <header class="topbar">
        <input type="checkbox" id="mobile-menu-toggle" class="mobile-menu-toggle" aria-hidden="true">
        <label for="mobile-menu-toggle" class="mobile-menu-button" aria-label="Menü öffnen">
          <span class="hamburger"></span>
        </label>

        <nav class="nav" aria-label="Hauptnavigation">
          <a href="./index.html">Startseite</a>
          <a href="./news.html">News</a>
          <a href="./games.html">Spiele</a>
          <a class="active" href="./contact.html">Kontakt</a>
        </nav>

        <div class="actions">
          <button class="icon-btn" type="button" aria-label="Warenkorb">
            <img
              class="icon-image"
              src="./assets/icons/basket-svgrepo-com.svg"
              alt=""
            />
          </button>
          <button class="icon-btn" type="button" aria-label="Favoriten">
            <img
              class="icon-image"
              src="./assets/icons/favorite-svgrepo-com.svg"
              alt=""
            />
          </button>
          <div class="avatar" aria-label="Profil">AK</div>
        </div>
      </header>

      <section class="page-panel">
        <p class="page-kicker">Support</p>
        <h1>Kontakt</h1>
        <p>
          Fragen zu Bestellungen, Spielen oder Plattformen.
        </p>
      </section>

      <section class="contact-form-container">
        <form class="contact-form" action="#" method="POST">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Name" required />
          </div>

          <div class="form-group">
            <label for="email">E-Mail</label>
            <input type="email" id="email" name="email" placeholder="E-Mail-Adresse" required />
          </div>

          <div class="form-group">
            <label for="subject">Betreff</label>
            <input type="text" id="subject" name="subject" placeholder="Betreff" required />
          </div>

          <div class="form-group">
            <label for="message">Nachricht</label>
            <textarea id="message" name="message" rows="6" placeholder="Deine Nachricht an uns..." required></textarea>
          </div>

          <button type="submit" class="submit-btn">Nachricht senden</button>
        </form>

        <div class="contact-info">
          <h2>Kontaktinformationen</h2>
          <p><strong>E-Mail:</strong> support@videospiel-shop.de</p>
          <p><strong>Telefon:</strong> +49 (0) 00 12345678</p>
          <p><strong>Adresse:</strong> Musterstraße 1, 12345 Musterstadt</p>
          <p><strong>Öffnungszeiten:</strong> Mo-Fr 9:00 - 18:00 Uhr</p>
        </div>
      </section>
    </main>
  </body>
</html>
