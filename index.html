<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta
      name="description"
      content="Online-Shop fuer Videospiele mit aktuellen Spielen, Filtern und Empfehlungen."
    />
    <title>Online-Shop fuer Videospiele | Startseite</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="store-shell">
      <header class="topbar">
        <input
          type="checkbox"
          id="mobile-menu-toggle"
          class="mobile-menu-toggle"
          aria-hidden="true"
        />
        <label
          for="mobile-menu-toggle"
          class="mobile-menu-button"
          aria-label="Menü öffnen"
        >
          <span class="hamburger"></span>
        </label>

        <nav class="nav" aria-label="Hauptnavigation">
          <a class="active" href="./index.html">Startseite</a>
          <a href="./news.html">News</a>
          <a href="./games.html">Spiele</a>
          <a href="./contact.html">Kontakt</a>
        </nav>

        <div class="actions">
          <button class="icon-btn" type="button" aria-label="Warenkorb">
            <img
              class="icon-image"
              src="./assets/icons/basket-svgrepo-com.svg"
              alt=""
            />
          </button>
          <button class="icon-btn" type="button" aria-label="Favoriten">
            <img
              class="icon-image"
              src="./assets/icons/favorite-svgrepo-com.svg"
              alt=""
            />
          </button>
          <div class="avatar" aria-label="Profil">AK</div>
        </div>
      </header>

      <section
        class="grid gap-9 md:grid-cols-[280px_minmax(0,1fr)] md:items-start"
      >
        <aside class="flex flex-col justify-between gap-7">
          <form
            id="filters-form"
            class="rounded-3xl border border-white/5 bg-[linear-gradient(180deg,rgba(48,41,35,0.7),rgba(28,31,37,0.92))] px-6 py-7"
            action="#"
          >
            <fieldset class="min-w-0 border-0 p-0">
              <legend class="mb-4 font-bold">Kategorien</legend>
              <div id="category-filters" class="grid gap-3"></div>
            </fieldset>

            <fieldset class="mt-7 min-w-0 border-0 p-0">
              <legend class="mb-4 font-bold">Plattformen</legend>
              <div id="platform-filters" class="grid gap-3"></div>
            </fieldset>

            <fieldset class="mt-7 min-w-0 border-0 p-0">
              <legend class="mb-4 font-bold">Sortierung</legend>
              <label class="sr-only" for="sort-select">Sortierung</label>
              <select
                id="sort-select"
                class="filter-select w-full rounded-[14px] border border-white/8 bg-white/5 px-[18px] py-4 text-[color:var(--text-main)]"
              >
                <option value="popular">Beliebt zuerst</option>
                <option value="price-asc">Preis: günstig zuerst</option>
                <option value="price-desc">Preis: teuer zuerst</option>
                <option value="title-asc">Titel: A bis Z</option>
              </select>
            </fieldset>

            <button
              id="reset-filters"
              class="mt-7 w-full rounded-full bg-gradient-to-b from-[color:var(--accent-strong)] to-[color:var(--accent-deep)] px-5 py-[18px] text-base font-bold text-[#24180f] transition hover:-translate-y-px hover:brightness-105"
              type="button"
            >
              Filter zurücksetzen
            </button>
          </form>

          <nav
            class="flex justify-center gap-6 pl-1.5 lg:justify-start"
            aria-label="Soziale Medien"
          >
            <a
              class="grid place-items-center transition hover:-translate-y-px"
              href="#"
              aria-label="X"
              ><img
                class="h-6 w-6 object-contain brightness-0 saturate-100 invert-[80%] contrast-[87%]"
                src="./assets/icons/twitter-svgrepo-com.svg"
                alt=""
            /></a>
            <a
              class="grid place-items-center transition hover:-translate-y-px"
              href="#"
              aria-label="Instagram"
              ><img
                class="h-6 w-6 object-contain brightness-0 saturate-100 invert-[80%] contrast-[87%]"
                src="./assets/icons/instagram-svgrepo-com.svg"
                alt=""
            /></a>
            <a
              class="grid place-items-center transition hover:-translate-y-px"
              href="#"
              aria-label="YouTube"
              ><img
                class="h-6 w-6 object-contain brightness-0 saturate-100 invert-[80%] contrast-[87%]"
                src="./assets/icons/youtube-svgrepo-com.svg"
                alt=""
            /></a>
            <a
              class="grid place-items-center transition hover:-translate-y-px"
              href="#"
              aria-label="Facebook"
              ><img
                class="h-6 w-6 object-contain brightness-0 saturate-100 invert-[80%] contrast-[87%]"
                src="./assets/icons/facebook-svgrepo-com.svg"
                alt=""
            /></a>
          </nav>
        </aside>

        <section class="grid gap-7">
          <article
            class="relative min-h-[340px] overflow-hidden rounded-[26px] border border-white/5 bg-[linear-gradient(90deg,rgba(28,21,18,0.62)_0%,rgba(28,21,18,0.18)_48%,rgba(17,12,10,0.1)_100%)] max-[900px]:min-h-[300px]"
          >
            <img
              class="absolute inset-0 z-0 h-full w-full object-cover object-center"
              src="./assets/images/horizon-zero-dawn-3840x2160-19141.jpg"
              alt="Horizon Forbidden West"
            />
            <div
              class="absolute bottom-[46px] left-[42px] z-10 max-w-[420px] max-[640px]:right-6 max-[640px]:bottom-7 max-[640px]:left-6"
            >
              <div class="text-base uppercase tracking-[0.28em] text-white/85">
                Neu erschienen
              </div>
              <h1
                class="my-[10px] text-[clamp(2.9rem,5vw,4.8rem)] leading-[0.9] tracking-[0.04em]"
              >
                Horizon
              </h1>
              <p class="m-0 text-white/80">Forbidden West</p>
            </div>
          </article>

          <section class="grid gap-5" aria-label="Empfohlene Spiele">
            <div
              class="flex flex-wrap items-center justify-between gap-3 rounded-3xl border border-white/5 bg-white/5 px-5 py-4"
            >
              <div>
                <p class="m-0 text-sm uppercase tracking-[0.24em] text-white/55">
                  Katalog
                </p>
                <h2 class="mt-2 text-2xl font-bold">Spiele entdecken</h2>
              </div>
              <p id="results-count" class="m-0 text-[color:var(--text-soft)]"></p>
            </div>

            <div
              id="no-results"
              class="no-results hidden rounded-3xl border border-dashed border-white/10 px-6 py-10 text-center"
            >
              <p class="m-0 text-sm uppercase tracking-[0.22em] text-white/45">
                Keine Treffer
              </p>
              <h3 class="mt-3 text-2xl font-bold">Keine Spiele gefunden</h3>
              <p class="mx-auto mt-3 mb-0 max-w-[480px] text-[color:var(--text-soft)]">
                Versuche, einige Filter zu entfernen oder eine andere Sortierung
                zu wählen.
              </p>
            </div>

            <div
              id="games-list"
              class="grid gap-7 md:grid-cols-2 xl:grid-cols-3"
            ></div>
          </section>
        </section>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
