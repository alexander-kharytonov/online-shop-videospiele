<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta
      name="description"
      content="Neuigkeiten und Updates aus der Welt der Videospiele."
    />
    <title>Online-Shop fuer Videospiele | Nachrichten</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="store-shell">
      <header class="topbar">
        <nav class="nav" aria-label="Hauptnavigation">
          <a href="./index.html">Startseite</a>
          <a class="active" href="./news.html">Nachrichten</a>
          <a href="./games.html">Spiele</a>
          <a href="./contact.html">Kontakt</a>
        </nav>

        <div class="actions">
          <button class="icon-btn" type="button" aria-label="Warenkorb">
            <img
              class="icon-image"
              src="./assets/icons/basket-svgrepo-com.svg"
              alt=""
            />
          </button>
          <button class="icon-btn" type="button" aria-label="Favoriten">
            <img
              class="icon-image"
              src="./assets/icons/favorite-svgrepo-com.svg"
              alt=""
            />
          </button>
          <div class="avatar" aria-label="Profil">AK</div>
        </div>
      </header>

      <section class="page-panel">
        <p class="page-kicker">Aktuelles</p>
        <h1>Nachrichten</h1>
        <p>
          Auf dieser Seite erscheinen spaeter News, Releases und Highlights aus
          dem Shop.
        </p>
      </section>
    </main>
  </body>
</html>
